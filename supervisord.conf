[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0

[program:loki]
command=/usr/bin/loki -config.file=/etc/loki/loki-config.yaml
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true

[program:grafana]
command=/run.sh
environment=GF_SERVER_HTTP_PORT="3000",GF_SERVER_ROOT_URL="%(ENV_GF_SERVER_ROOT_URL)s",GF_SECURITY_ADMIN_USER="%(ENV_GRAFANA_ADMIN_USER)s",GF_SECURITY_ADMIN_PASSWORD="%(ENV_GRAFANA_ADMIN_PASSWORD)s",GF_PATHS_PROVISIONING="/etc/grafana/provisioning",GF_PANELS_DISABLE_SANITIZE_HTML="true"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true

[program:healthcheck]
command=python3 /healthcheck.py
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startsecs=5

[program:testrunner]
command=python3 /testrunner.py
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startsecs=10

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
