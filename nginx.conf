worker_processes 1;
events { worker_connections 128; }

http {
    # Loki push API — basic auth required
    server {
        listen 3100;

        location / {
            auth_basic "Loki";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://127.0.0.1:3101;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
